<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Date? ☕📚</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Inter:wght@400;700;900&family=Schoolbell&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-accent: #ff6b81;
            --dark-accent: #ff4757;
            --bg-light: #fdf5e6;
            --dreamy-blue: #a8c0ff;
            --text-dark: #333;
        }

        /* Film Grain layer */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.png');
            opacity: 0.06;
            pointer-events: none;
            z-index: 50;
            display: none;
        }

        @keyframes pulseHeart {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            transition: background 1.5s ease;
        }

        .album-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1478147427282-58a87a120781?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -3;
            display: none;
            filter: brightness(0.35) blur(2px);
        }

        .blue-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(20, 30, 48, 0.5) 0%, rgba(36, 59, 85, 0.9) 100%);
            z-index: -2;
            display: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        .container {
            text-align: center;
            padding: 3rem 1.5rem;
            max-width: 440px;
            width: 85%;
            position: relative;
            z-index: 10;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 60px -12px rgba(255, 107, 129, 0.15);
            border: 1px solid rgba(255, 107, 129, 0.12);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            margin: 20px;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 2.5rem 1.2rem;
                width: 88%;
            }

            h1 {
                font-size: 2.5rem !important;
            }

            .info-container {
                padding: 1.2rem !important;
            }

            button {
                padding: 16px !important;
                font-size: 0.85rem !important;
            }

            .objectives {
                gap: 5px !important;
            }

            .obj-item {
                font-size: 0.75rem !important;
                padding: 5px 10px !important;
            }

            .highlight-large {
                font-size: 1.3rem !important;
            }
        }

        .content-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .secret-badge {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
            background: var(--dark-accent);
            padding: 4px 12px;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 900;
        }

        .theme-emojis {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        h1 {
            font-family: 'Schoolbell', cursive;
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            color: var(--primary-accent);
            line-height: 1.1;
            font-weight: normal;
        }

        .subtitle {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .highlight {
            font-weight: 800;
            color: var(--primary-accent);
        }

        .highlight-large {
            display: inline-block;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--dark-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .info-container {
            background: rgba(255, 107, 129, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            margin: 0.5rem auto 1.5rem auto;
            width: 100%;
            max-width: 320px;
            border: 1px solid rgba(255, 107, 129, 0.2);
            box-shadow: inset 0 0 10px rgba(255, 107, 129, 0.05);
            text-align: left;
            box-sizing: border-box;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: 700;
            color: var(--dark-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #555;
            font-weight: 600;
            text-align: right;
            padding-left: 10px;
        }

        .plan-box {
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #4a4a4a;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .objectives-wrapper {
            margin-bottom: 2rem;
            width: 100%;
        }

        .obj-title {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--dark-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .objectives {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .obj-item {
            background: #fff;
            border: 1px solid rgba(255, 107, 129, 0.3);
            color: var(--text-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        /* Modified to allow the Yes button to grow without breaking the layout */
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            min-height: 80px;
            flex-wrap: wrap;
        }

        button {
            padding: 18px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        #yesBtn {
            background: linear-gradient(135deg, var(--primary-accent), var(--dark-accent));
            color: white;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.3);
            z-index: 10;
            font-size: 1rem;
        }

        /* Removed absolute positioning so it sits nicely next to the growing Accept button */
        #noBtn {
            background: #ffffff;
            color: var(--dark-accent);
            font-size: 0.85rem;
            border: 2px solid var(--primary-accent);
            z-index: 9;
        }

        .signature {
            margin-top: 25px;
            font-family: 'Schoolbell', cursive;
            color: #888;
            font-size: 1.5rem;
        }

        /* Glass Mode */
        .glass-mode {
            background: rgba(20, 20, 25, 0.4) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(25px);
        }

        .glass-mode h1,
        .glass-mode .highlight,
        .glass-mode .info-label,
        .glass-mode .obj-title {
            color: var(--dreamy-blue);
        }

        .glass-mode .subtitle,
        .glass-mode .info-value,
        .glass-mode .plan-box,
        .glass-mode .signature {
            color: rgba(255, 255, 255, 0.9);
        }

        .glass-mode .highlight-large {
            color: #fff;
        }

        .glass-mode .info-container {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(168, 192, 255, 0.2);
            box-shadow: none;
        }

        .glass-mode .secret-badge {
            display: none;
        }

        .glass-mode .obj-item {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(168, 192, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            box-shadow: none;
        }

        #player-wrapper {
            visibility: hidden;
            position: absolute;
        }
    </style>
</head>

<body>
    <div id="grain-layer" class="grain"></div>
    <div id="album-bg" class="album-bg"></div>
    <div id="blue-overlay" class="blue-overlay"></div>

    <div id="overlay" onclick="startExperience()">
        <div style="text-align:center;">
            <div style="font-size: 5rem; animation: pulseHeart 2s infinite; cursor: pointer;">💌</div>
            <h2
                style="color: var(--dark-accent); font-weight: 900; letter-spacing: 1px; margin-top: 25px; font-size: 1.3rem;">
                Bevy, you have a message</h2>
            <p
                style="color: var(--primary-accent); font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; font-weight: 700; opacity: 0.8;">
                Tap to Open</p>
        </div>
    </div>

    <div id="player-wrapper">
        <div id="player"></div>
    </div>

    <div class="container" id="main-content">
        <div class="content-wrap" id="main-wrap">
            <div class="secret-badge">Ta Study Date</div>
            <div class="theme-emojis">🩺😻💻</div>
            <h1>Hi Bevy!</h1>

            <div class="subtitle">
                Would you <span class="highlight">accompany me</span> to a <br>
                <span class="highlight-large">Study Date?</span>
            </div>

            <div class="info-container">
                <div class="info-row">
                    <span class="info-label">Date:</span>
                    <span class="info-value">Wednesday, March 11, 2026</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Time:</span>
                    <span class="info-value">12:00 PM onwards</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Location:</span>
                    <span class="info-value">Sumu, UST</span>
                </div>
            </div>

            <div class="plan-box">
                Sa Maternal ka, Sa Cisco ako. G?
            </div>

            <div class="objectives-wrapper">
                <div class="obj-title">Objectives</div>
                <div class="objectives">
                    <span class="obj-item">✔️ Pass</span>
                    <span class="obj-item">🎓 Graduate</span>
                    <span class="obj-item">💸 Get Rich</span>
                </div>
            </div>

            <div class="button-container">
                <button id="yesBtn" onclick="onYesClicked()">Accept Invitation</button>
                <button id="noBtn" onclick="handleDeclineClick(event)">Decline</button>
            </div>

            <div class="signature" id="sig">- Ken</div>
        </div>
    </div>

    <script>
        // YouTube API Setup
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var songStart = 0;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'yfzsBA5dZdE',
                playerVars: { 'autoplay': 0, 'controls': 0, 'start': songStart, 'modestbranding': 1, 'playsinline': 1 },
                events: { 'onReady': (e) => { e.target.setVolume(100); } }
            });
        }

        // Open Envelope
        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 800);
        }

        // Guilt-Trip Logic
        let declineClickCount = 0;
        const guiltTrips = [
            "Sure ka na?",
            "Babagsak ka sige.",
            "Magagalit si Angela",
            "Please",
            "Bawal tumanggi"
        ];

        function handleDeclineClick(e) {
            if (e) { e.preventDefault(); }

            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');

            // Set the text to the current guilt trip
            noBtn.innerText = guiltTrips[Math.min(declineClickCount, guiltTrips.length - 1)];

            // Make the Accept button grow massively
            let currentFontSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentFontSize * 1.35) + 'px';

            let currentPadTop = parseFloat(window.getComputedStyle(yesBtn).paddingTop);
            let currentPadLeft = parseFloat(window.getComputedStyle(yesBtn).paddingLeft);
            yesBtn.style.padding = `${currentPadTop * 1.2}px ${currentPadLeft * 1.2}px`;

            declineClickCount++;

            // If she goes through all of them, hide the decline button entirely!
            if (declineClickCount > guiltTrips.length) {
                noBtn.style.display = 'none';
            }
        }

        // Acceptance & Transformation to Glass/Dreamy Mode
        function onYesClicked() {
            if (player && player.playVideo) { player.unMute(); player.seekTo(songStart); player.playVideo(); }

            document.body.style.backgroundColor = "#050508";
            document.getElementById('grain-layer').style.display = 'block';
            document.getElementById('album-bg').style.display = 'block';
            document.getElementById('blue-overlay').style.display = 'block';

            const container = document.getElementById('main-content');
            container.classList.add('glass-mode');

            container.innerHTML = `
                <div style="opacity: 0; animation: fadeIn 2.5s forwards; display: flex; flex-direction: column; align-items: center;">
                    <div style="font-size: 2.5rem; margin-bottom: 15px; letter-spacing: 10px;">🩺😻💻</div>
                    <h1 style="font-size: 3.5rem; font-family: 'Schoolbell', cursive; margin-bottom: 5px;">YAY!</h1>
                    
                    <div class="info-container" style="background: rgba(0,0,0,0.3); border-color: rgba(168, 192, 255, 0.2); max-width: 250px;">
                         <div class="info-row"><span class="info-label" style="color: var(--dreamy-blue);">Venue:</span><span class="info-value" style="color: rgba(255,255,255,0.9);">Sumu, UST</span></div>
                         <div class="info-row"><span class="info-label" style="color: var(--dreamy-blue);">Status:</span><span class="info-value" style="color: rgba(255,255,255,0.9);">Confirmed</span></div>
                    </div>
                    
                    <p style="margin: 1rem 0; line-height: 1.6; font-size: 1.05rem; color: rgba(255,255,255,0.9); font-weight: 400;">
                        I can't wait to see you!<br>
                        I'll make sure to save us a spot.
                    </p>

                    <p style="margin: 0.5rem 0; line-height: 1.6; font-size: 0.65rem; color: var(--dreamy-blue); font-weight: 400; font-style: italic;">
                        Note: Just bring your iPad and your beautiful self, Bevy <3. I'm not lovebombing you, I just really want to spend time with you and make sure you have a great day.
                    </p>
                    
                    <div class="signature" style="margin-top: 25px; font-family: 'Schoolbell', cursive; font-size: 1.8rem; color: rgba(255,255,255,0.8);">- Ken</div>
                    
                    <p style="font-size: 0.55rem; color: var(--dreamy-blue); margin-top: 3.5rem; font-weight: 900; letter-spacing: 4px; opacity: 0.8; text-transform: uppercase;">
                        FADE INTO YOU — MAZZY STAR
                    </p>
                </div>
            `;
        }
    </script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
